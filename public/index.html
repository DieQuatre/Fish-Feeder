<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ESP8266 Automatic Fish Feeder - Login">
  <title>Fish Feeder — Login</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐟</text></svg>">
</head>
<body>
  <div class="bg-effects">
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>
  </div>

  <div class="login-container">
    <div class="login-card">
      <div style="text-align:right; margin:-12px -8px 8px 0;">
        <button class="lang-toggle" onclick="toggleLang()" style="background:transparent;border:1px solid var(--border-glass);color:var(--text-secondary);padding:4px 12px;border-radius:20px;cursor:pointer;font-size:0.8rem;font-family:'Inter',sans-serif;">🇹🇷 TR</button>
      </div>
      <div class="login-logo">
        <span class="icon">🐟</span>
        <h1 data-i18n="login.title">Fish Feeder</h1>
        <p data-i18n="login.subtitle">Automatic Fish Feeder Control Panel</p>
      </div>

      <div id="errorMsg" class="error-msg"></div>
      <div id="successMsg" class="success-msg"></div>

      <!-- Login Form -->
      <form id="loginForm">
        <div class="form-group">
          <label for="loginUsername" data-i18n="login.username">Username</label>
          <input type="text" id="loginUsername" data-i18n="login.username.placeholder" placeholder="Enter your username" autocomplete="username" required>
        </div>
        <div class="form-group">
          <label for="loginPassword" data-i18n="login.password">Password</label>
          <input type="password" id="loginPassword" data-i18n="login.password.placeholder" placeholder="Enter your password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary" id="loginBtn" data-i18n="login.btn">
          🔓 Sign In
        </button>
      </form>

      <!-- Register Form -->
      <form id="registerForm" style="display:none;">
        <div class="form-group">
          <label for="regUsername" data-i18n="reg.username">Username</label>
          <input type="text" id="regUsername" data-i18n="reg.username.placeholder" placeholder="At least 3 characters" autocomplete="username" required>
        </div>
        <div class="form-group">
          <label for="regEmail" data-i18n="reg.email">Email</label>
          <input type="email" id="regEmail" data-i18n="reg.email.placeholder" placeholder="your@email.com" autocomplete="email" required>
        </div>
        <div class="form-group">
          <label for="regQuestion" data-i18n="sec.question">Security Question</label>
          <select id="regQuestion" required>
            <option value="" disabled selected data-i18n="sec.select">Select a question...</option>
            <option value="What was the name of your primary school teacher?" data-i18n="sec.q1">What was the name of your primary school teacher?</option>
            <option value="What is the name of your first pet?" data-i18n="sec.q2">What is the name of your first pet?</option>
            <option value="What is your favorite color?" data-i18n="sec.q3">What is your favorite color?</option>
            <option value="What city were you born in?" data-i18n="sec.q4">What city were you born in?</option>
          </select>
        </div>
        <div class="form-group">
          <label for="regAnswer" data-i18n="sec.answer">Answer</label>
          <input type="text" id="regAnswer" autocomplete="off" required>
        </div>
        <div class="form-group">
          <label for="regPassword" data-i18n="reg.password">Password</label>
          <input type="password" id="regPassword" data-i18n="reg.password.placeholder" placeholder="At least 6 characters" autocomplete="new-password" required>
        </div>
        <div class="form-group">
          <label for="regPasswordConfirm" data-i18n="reg.passwordConfirm">Confirm Password</label>
          <input type="password" id="regPasswordConfirm" data-i18n="reg.passwordConfirm.placeholder" placeholder="Re-enter your password" autocomplete="new-password" required>
        </div>
        <button type="submit" class="btn btn-primary" id="registerBtn" data-i18n="reg.btn">
          ✨ Sign Up
        </button>
      </form>

      <!-- Forgot Password Form -->
      <form id="forgotForm" style="display:none;">
        <div id="forgotStep1">
          <p style="color:var(--text-secondary); font-size:0.9rem; margin-bottom:20px; text-align:center;" data-i18n="forgot.desc">Enter your username or email to reset your password.</p>
          <div class="form-group">
            <label for="forgotIdentifier" data-i18n="forgot.identifier">Username or Email</label>
            <input type="text" id="forgotIdentifier" required>
          </div>
          <button type="button" class="btn btn-primary" id="getQuestionBtn" data-i18n="forgot.btn1">
            🔍 Find Account
          </button>
        </div>

        <div id="forgotStep2" style="display:none;">
          <div class="form-group">
            <label data-i18n="sec.question">Security Question</label>
            <div id="displayQuestion" style="padding: 12px; background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.3); border-radius: 8px; font-weight: 500; font-size: 0.95rem; margin-bottom: 12px; color: var(--accent-blue);"></div>
          </div>
          <div class="form-group">
            <label for="forgotAnswer" data-i18n="sec.answer">Answer</label>
            <input type="text" id="forgotAnswer" autocomplete="off" required>
          </div>
          <div class="form-group">
            <label for="forgotNewPassword" data-i18n="forgot.newPassword">New Password</label>
            <input type="password" id="forgotNewPassword" required>
          </div>
          <button type="submit" class="btn btn-success" id="resetPasswordBtn" data-i18n="forgot.btn2">
            🔐 Reset Password
          </button>
        </div>
      </form>

      <div class="toggle-link" id="toggleLink">
        <span data-i18n="login.noAccount">Don't have an account?</span> <a href="#" id="toggleAuth" data-i18n="login.register">Sign Up</a>
      </div>
      <div style="text-align:center; margin-top:8px;">
        <a href="#" id="forgotLink" style="color:var(--text-muted); font-size:0.85rem; text-decoration:none;" data-i18n="login.forgot">Forgot your password?</a>
      </div>
      <div style="text-align:center; margin-top:12px;">
        <a href="/guide" style="color:var(--text-muted); font-size:0.85rem; text-decoration:none;" data-i18n="login.guide">📖 Setup Guide</a>
      </div>
    </div>
  </div>

  <script src="js/i18n.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
