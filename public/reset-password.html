<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Fish Feeder - Reset Password">
  <title>Fish Feeder — Reset Password</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐟</text></svg>">
</head>
<body>
  <div class="bg-effects">
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>
  </div>

  <div class="login-container">
    <div class="login-card">
      <div style="text-align:right; margin:-12px -8px 8px 0;">
        <button class="lang-toggle" onclick="toggleLang()" style="background:transparent;border:1px solid var(--border-glass);color:var(--text-secondary);padding:4px 12px;border-radius:20px;cursor:pointer;font-size:0.8rem;font-family:'Inter',sans-serif;">🇹🇷 TR</button>
      </div>
      <div class="login-logo">
        <span class="icon">🔑</span>
        <h1 data-i18n="reset.title">Reset Password</h1>
        <p data-i18n="reset.subtitle">Enter your new password</p>
      </div>

      <div id="errorMsg" class="error-msg"></div>
      <div id="successMsg" class="success-msg"></div>

      <form id="resetForm">
        <div class="form-group">
          <label for="newPassword" data-i18n="reset.password">New Password</label>
          <input type="password" id="newPassword" data-i18n="reset.password.placeholder" placeholder="At least 6 characters" required>
        </div>
        <div class="form-group">
          <label for="confirmPassword" data-i18n="reset.confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" data-i18n="reset.confirmPassword.placeholder" placeholder="Re-enter your new password" required>
        </div>
        <button type="submit" class="btn btn-primary" id="resetBtn" data-i18n="reset.btn">
          🔐 Reset Password
        </button>
      </form>

      <div style="text-align:center; margin-top:16px;">
        <a href="/" style="color:var(--text-muted); font-size:0.85rem; text-decoration:none;" data-i18n="reset.backToLogin">← Back to Sign In</a>
      </div>
    </div>
  </div>

  <script src="js/i18n.js"></script>
  <script>
    const API_BASE = window.location.origin;
    const urlParams = new URLSearchParams(window.location.search);
    const resetToken = urlParams.get('token');

    if (!resetToken) {
      document.getElementById('errorMsg').textContent = 'Invalid reset link.';
      document.getElementById('errorMsg').style.display = 'block';
      document.getElementById('resetForm').style.display = 'none';
    }

    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('newPassword').value;
      const confirmPw = document.getElementById('confirmPassword').value;
      const errorEl = document.getElementById('errorMsg');
      const successEl = document.getElementById('successMsg');
      errorEl.style.display = 'none';
      successEl.style.display = 'none';

      if (!password || !confirmPw) {
        errorEl.textContent = t('err.fillAll');
        errorEl.style.display = 'block';
        return;
      }
      if (password !== confirmPw) {
        errorEl.textContent = t('err.passwordMismatch');
        errorEl.style.display = 'block';
        return;
      }

      const btn = document.getElementById('resetBtn');
      btn.disabled = true;
      btn.textContent = '⏳...';

      try {
        const res = await fetch(`${API_BASE}/api/auth/reset-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: resetToken, password })
        });
        const data = await res.json();

        if (!res.ok) {
          errorEl.textContent = data.error;
          errorEl.style.display = 'block';
          btn.disabled = false;
          btn.textContent = t('reset.btn');
          return;
        }

        successEl.textContent = t('reset.success');
        successEl.style.display = 'block';
        document.getElementById('resetForm').style.display = 'none';
        setTimeout(() => { window.location.href = '/'; }, 2000);
      } catch (err) {
        errorEl.textContent = t('err.serverDown');
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = t('reset.btn');
      }
    });
  </script>
</body>
</html>
